<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>⛽ 우리 동네 최저가 주유소</title>

  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=0562084ccf6534e21f4677141d3bec4f&libraries=services&autoload=false">
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0f14;
      --surface: #161a23;
      --border:  #252a38;
      --accent:  #f9a825;
      --red:     #ff3b3b;
      --blue:    #2979ff;
      --green:   #00e676;
      --text:    #e8eaf0;
      --muted:   #8892a4;
      --radius:  14px;
    }
    html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    #app {
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 360px 1fr;
      height: 100vh;
    }

    header {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      z-index: 10;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: var(--accent); }
    .logo span { color: var(--text); }
    .header-controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }

    select, button { font-family: 'Noto Sans KR', sans-serif; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer; transition: all .18s; }
    select { padding: 6px 10px; outline: none; }
    select:hover { border-color: var(--accent); }
    .btn { padding: 7px 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
    .btn-primary:hover { filter: brightness(1.12); }

    #sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sidebar-header h2 { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
    .summary-row { display: flex; gap: 8px; margin-top: 10px; }
    .summary-pill { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; text-align: center; }
    .summary-pill .val { font-size: 16px; font-weight: 700; color: var(--accent); }
    .summary-pill .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    #station-list { overflow-y: auto; flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    #station-list::-webkit-scrollbar { width: 4px; }
    #station-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .station-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; transition: border-color .18s, transform .12s; position: relative; }
    .station-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; background: var(--blue); }
    .station-card.cheapest::before { background: var(--red); }
    .station-card:hover { border-color: var(--accent); transform: translateX(2px); }
    .card-top { display: flex; align-items: flex-start; gap: 8px; }
    .card-rank { font-size: 11px; font-weight: 700; color: var(--muted); background: var(--surface); border-radius: 6px; padding: 2px 7px; flex-shrink: 0; white-space: nowrap; }
    .cheapest .card-rank { background: var(--red); color: #fff; }
    .card-name { font-size: 14px; font-weight: 700; flex: 1; line-height: 1.3; }
    .card-price { font-size: 18px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .card-price small { font-size: 11px; color: var(--muted); }
    .card-meta { font-size: 12px; color: var(--muted); margin-top: 6px; display: flex; gap: 10px; }

    #map-wrap { position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    .map-label { position: relative; padding: 6px 11px; border-radius: 8px; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700; white-space: nowrap; box-shadow: 0 2px 10px rgba(0,0,0,.4); cursor: pointer; transition: transform .15s; transform-origin: bottom center; }
    .map-label::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); border-width: 5px 4px 0; border-style: solid; }
    .map-label:hover { transform: scale(1.08); }
    .map-label.cheap  { background: var(--red);  color: #fff; }
    .map-label.cheap::after  { border-color: var(--red)  transparent transparent; }
    .map-label.normal { background: var(--blue); color: #fff; }
    .map-label.normal::after { border-color: var(--blue) transparent transparent; }
    .map-label .sname { font-size: 11px; opacity: .85; }
    .map-label .sprice { font-size: 13px; font-weight: 700; }

    #info-panel { position: absolute; bottom: 20px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; min-width: 220px; max-width: 280px; z-index: 100; display: none; box-shadow: 0 4px 24px rgba(0,0,0,.5); }
    #info-panel.visible { display: block; animation: fadeUp .2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    #info-panel .close-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; }
    #info-panel h3 { font-size: 15px; font-weight: 700; padding-right: 20px; line-height: 1.3; }
    #info-panel .ip-price { font-size: 26px; font-weight: 700; color: var(--accent); margin: 6px 0; }
    #info-panel .ip-badge { display: inline-block; background: var(--red); color: #fff; font-size: 11px; font-weight: 700; border-radius: 5px; padding: 2px 8px; margin-bottom: 6px; }
    #info-panel .ip-meta { font-size: 12px; color: var(--muted); line-height: 1.8; margin-top: 4px; }
    .nav-btn { display: block; width: 100%; margin-top: 8px; padding: 8px; border-radius: 8px; background: var(--accent); color: #000; font-size: 13px; font-weight: 700; border: none; cursor: pointer; text-align: center; text-decoration: none; }
    .nav-btn:hover { filter: brightness(1.1); }

    #loading { position: fixed; inset: 0; background: rgba(13,15,20,.88); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9998; gap: 16px; transition: opacity .3s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: 14px; }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 10px 20px; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 8px; z-index: 9999; transition: transform .3s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 4px 24px rgba(0,0,0,.5); }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 680px) {
      #app { grid-template-rows: 52px 1fr auto; grid-template-columns: 1fr; }
      #sidebar { border-right: none; border-top: 1px solid var(--border); max-height: 36vh; }
      #map-wrap { height: calc(64vh - 52px); }
      #info-panel { left: 12px; right: 12px; bottom: 10px; }
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">⛽ <span>최저가</span> 주유소</div>
    <div class="header-controls">
      <select id="fuel-type">
        <option value="B027">휘발유</option>
        <option value="D047">경유</option>
        <option value="K010">등유</option>
        <option value="C004">LPG</option>
      </select>
      <select id="radius-sel">
        <option value="3000">3km</option>
        <option value="5000" selected>5km</option>
        <option value="10000">10km</option>
      </select>
      <button class="btn btn-primary" id="refresh-btn">🔄 새로고침</button>
    </div>
  </header>

  <div id="sidebar">
    <div class="sidebar-header">
      <h2>📋 주유소 목록</h2>
      <div class="summary-row">
        <div class="summary-pill">
          <div class="val" id="sum-count">—</div>
          <div class="lbl">검색 결과</div>
        </div>
        <div class="summary-pill">
          <div class="val" id="sum-min">—</div>
          <div class="lbl">최저가</div>
        </div>
        <div class="summary-pill">
          <div class="val" id="sum-avg">—</div>
          <div class="lbl">평균가</div>
        </div>
      </div>
    </div>
    <div id="station-list">
      <div style="color:var(--muted);font-size:13px;padding:20px;text-align:center;">위치를 가져오는 중...</div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="info-panel">
      <button class="close-btn" onclick="closeInfoPanel()">✕</button>
      <div id="ip-content"></div>
    </div>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-msg">위치를 가져오는 중...</p>
</div>

<div id="toast">
  <span id="toast-icon">ℹ️</span>
  <span id="toast-msg"></span>
</div>

<script>
/* ══════════════════════════════════════════════════════
   설정
══════════════════════════════════════════════════════ */
const OPINET_KEY    = 'F260418102';
const WORKER_URL    = 'https://opinet-proxy.cnh7821.workers.dev';

const BRAND_MAP = {
  'SKE':'SK에너지','GSC':'GS칼텍스','HDO':'HD현대오일뱅크',
  'SOL':'S-OIL','RTE':'자영알뜰','RTX':'고속도로알뜰',
  'NHO':'농협알뜰','ETC':'기타','EGS':'E1','SKG':'SK가스',
};

/* ══════════════════════════════════════════════════════
   상태
══════════════════════════════════════════════════════ */
let map, userLat, userLng;
let overlays = [];
let stations = [];

/* ══════════════════════════════════════════════════════
   UI 헬퍼
══════════════════════════════════════════════════════ */
function setLoading(show, msg) {
  if (msg) document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading').classList.toggle('hidden', !show);
}

let toastTimer;
function showToast(msg, icon, dur) {
  icon = icon || 'ℹ️'; dur = dur || 3000;
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => document.getElementById('toast').classList.remove('show'), dur);
}

function closeInfoPanel() {
  document.getElementById('info-panel').classList.remove('visible');
}

function distText(m) {
  return m < 1000 ? Math.round(m) + 'm' : (m / 1000).toFixed(1) + 'km';
}

/* ══════════════════════════════════════════════════════
   KATEC → WGS84 변환
══════════════════════════════════════════════════════ */
function katecToWGS84(katecX, katecY) {
  const RE = 6378137.0, F = 1/298.257222101;
  const ES = 2*F - F*F, E = Math.sqrt(ES);
  const ORIG_LAT = 38.0*Math.PI/180, ORIG_LON = 127.0*Math.PI/180;
  const K0 = 0.9999, X0 = 200000, Y0 = 500000;

  function mArc(lat) {
    return RE*((1-ES/4-3*ES*ES/64-5*ES**3/256)*lat
      -(3*ES/8+3*ES*ES/32+45*ES**3/1024)*Math.sin(2*lat)
      +(15*ES*ES/256+45*ES**3/1024)*Math.sin(4*lat)
      -(35*ES**3/3072)*Math.sin(6*lat));
  }

  const x = katecX-X0, y = katecY-Y0;
  const M0 = mArc(ORIG_LAT), M = M0+y/K0;
  const mu = M/(RE*(1-ES/4-3*ES*ES/64-5*ES**3/256));
  const e1 = (1-Math.sqrt(1-ES))/(1+Math.sqrt(1-ES));
  const phi1 = mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1*e1/16-55*e1**4/32)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);
  const s1=Math.sin(phi1), c1=Math.cos(phi1), t1=Math.tan(phi1);
  const N1=RE/Math.sqrt(1-ES*s1*s1), R1=RE*(1-ES)/Math.pow(1-ES*s1*s1,1.5);
  const C1=(ES/(1-ES))*c1*c1, D=x/(N1*K0);
  const lat=(phi1-(N1*t1/R1)*(D*D/2-(5+3*t1*t1+10*C1-4*C1*C1-9*(ES/(1-ES)))*D**4/24+(61+90*t1*t1+298*C1+45*t1**4-252*(ES/(1-ES))-3*C1*C1)*D**6/720))*180/Math.PI;
  const lng=(ORIG_LON+(D-(1+2*t1*t1+C1)*D**3/6+(5-2*C1+28*t1*t1-3*C1*C1+8*(ES/(1-ES))+24*t1**4)*D**5/120)/c1)*180/Math.PI;
  return { lat, lng };
}

function resolveLatLng(s) {
  const x = s.gisX, y = s.gisY;
  if (x > 1000 && y > 1000) return katecToWGS84(x, y);
  if (x > 90 && x < 145) return { lat: y, lng: x };
  return { lat: x, lng: y };
}

function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ══════════════════════════════════════════════════════
   카카오맵 초기화
══════════════════════════════════════════════════════ */
function initMap(lat, lng) {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(lat, lng),
    level: 5,
  });
  new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(lat, lng),
    content: '<div style="width:16px;height:16px;border-radius:50%;background:#00e676;border:3px solid #fff;box-shadow:0 0 0 4px rgba(0,230,118,.3);"></div>',
    zIndex: 10,
  }).setMap(map);
}

/* ══════════════════════════════════════════════════════
   오피넷 API — Cloudflare Worker 프록시 경유
══════════════════════════════════════════════════════ */
async function fetchStations(lat, lng, radius, fuelCode) {
  const apiUrl = [
    'https://www.opinet.co.kr/api/aroundAll.do',
    '?code=' + OPINET_KEY,
    '&x=' + lng,
    '&y=' + lat,
    '&radius=' + radius,
    '&prodcd=' + fuelCode,
    '&sort=1',
    '&out=xml',
  ].join('');

  const proxyUrl = WORKER_URL + '?url=' + encodeURIComponent(apiUrl);
  const res = await fetch(proxyUrl);
  if (!res.ok) throw new Error('프록시 오류: ' + res.status);

  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'text/xml');
  const oils = [...xml.querySelectorAll('OIL')];

  if (oils.length === 0) {
    // 오류 메시지 확인
    const errMsg = xml.querySelector('errMsg')?.textContent || '';
    const returnCode = xml.querySelector('returnCode')?.textContent || '';
    throw new Error('오피넷 응답 오류 ' + returnCode + ': ' + (errMsg || '데이터 없음'));
  }

  return oils.map(o => ({
    id:      o.querySelector('UNI_ID')?.textContent || '',
    name:    o.querySelector('OS_NM')?.textContent  || '이름 없음',
    brand:   o.querySelector('POLL_DIV_CD')?.textContent || '',
    address: o.querySelector('VAN_ADR')?.textContent || '',
    price:   parseInt(o.querySelector('PRICE')?.textContent || '0', 10),
    gisX:    parseFloat(o.querySelector('GIS_X')?.textContent || '0'),
    gisY:    parseFloat(o.querySelector('GIS_Y')?.textContent || '0'),
    selfYn:  o.querySelector('SELF_YN')?.textContent || 'N',
    tel:     o.querySelector('TEL')?.textContent    || '',
  }));
}

/* ══════════════════════════════════════════════════════
   마커 렌더링
══════════════════════════════════════════════════════ */
function clearOverlays() {
  overlays.forEach(o => o.setMap(null));
  overlays = [];
}

function renderMarkers(list) {
  clearOverlays();
  if (!list.length) return;
  const priced = list.filter(s => s.price > 0);
  const minPrice = priced.length ? Math.min(...priced.map(s => s.price)) : 0;

  list.forEach(s => {
    const { lat, lng } = resolveLatLng(s);
    if (!lat || !lng) return;
    const isCheap = s.price === minPrice && minPrice > 0;
    const dist = haversine(userLat, userLng, lat, lng);

    const el = document.createElement('div');
    el.className = 'map-label ' + (isCheap ? 'cheap' : 'normal');
    el.innerHTML = '<div class="sname">' + s.name + '</div>'
      + '<div class="sprice">' + (s.price > 0 ? s.price.toLocaleString() + '원' : distText(dist)) + '</div>';
    el.addEventListener('click', () => showInfoPanel(s, isCheap));

    const ov = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(lat, lng),
      content: el,
      yAnchor: 1.3,
      zIndex: isCheap ? 5 : 3,
    });
    ov.setMap(map);
    overlays.push(ov);
  });
}

/* ══════════════════════════════════════════════════════
   사이드바
══════════════════════════════════════════════════════ */
function renderList(list) {
  const el = document.getElementById('station-list');
  const priced = list.filter(s => s.price > 0).sort((a, b) => a.price - b.price);

  if (!priced.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:20px;text-align:center;">주변 주유소가 없습니다.</div>';
    document.getElementById('sum-count').textContent = '0개';
    document.getElementById('sum-min').textContent = '—';
    document.getElementById('sum-avg').textContent = '—';
    return;
  }

  const minPrice = priced[0].price;
  const avg = Math.round(priced.reduce((s, x) => s + x.price, 0) / priced.length);
  document.getElementById('sum-count').textContent = priced.length + '개';
  document.getElementById('sum-min').textContent = minPrice.toLocaleString();
  document.getElementById('sum-avg').textContent = avg.toLocaleString();

  el.innerHTML = priced.map((s, i) => {
    const { lat, lng } = resolveLatLng(s);
    const dist = haversine(userLat, userLng, lat, lng);
    const isCheap = s.price === minPrice;
    const brand = BRAND_MAP[s.brand] || s.brand || '기타';

    return '<div class="station-card ' + (isCheap ? 'cheapest' : '') + '" onclick="focusStation(' + lat + ',' + lng + ',\'' + s.id + '\')">'
      + '<div class="card-top">'
      + '<span class="card-rank">' + (isCheap ? '🏆 최저가' : '#' + (i+1)) + '</span>'
      + '<div class="card-name">' + s.name + '</div>'
      + '<div class="card-price">' + s.price.toLocaleString() + '<small>원</small></div>'
      + '</div>'
      + '<div class="card-meta">'
      + '<span>📍 ' + distText(dist) + '</span>'
      + '<span>🏷 ' + brand + '</span>'
      + (s.selfYn === 'Y' ? '<span>🤖 셀프</span>' : '')
      + '</div>'
      + '</div>';
  }).join('');
}

/* ══════════════════════════════════════════════════════
   정보 패널
══════════════════════════════════════════════════════ */
function showInfoPanel(s, isCheap) {
  const { lat, lng } = resolveLatLng(s);
  const dist = haversine(userLat, userLng, lat, lng);
  const brand = BRAND_MAP[s.brand] || s.brand || '기타';
  const naviUrl = 'https://map.kakao.com/link/to/' + encodeURIComponent(s.name) + ',' + lat + ',' + lng;

  document.getElementById('ip-content').innerHTML =
    (isCheap ? '<div class="ip-badge">🏆 최저가 주유소</div>' : '')
    + '<h3>' + s.name + '</h3>'
    + (s.price > 0 ? '<div class="ip-price">' + s.price.toLocaleString() + '원/ℓ</div>' : '')
    + '<div class="ip-meta">'
    + '🏷 ' + brand + ' &nbsp;|&nbsp; 📍 ' + distText(dist) + '<br>'
    + (s.address ? '📌 ' + s.address + '<br>' : '')
    + (s.tel ? '📞 ' + s.tel : '')
    + (s.selfYn === 'Y' ? '<br>🤖 셀프 주유소' : '')
    + '</div>'
    + '<a class="nav-btn" href="' + naviUrl + '" target="_blank">🚗 카카오맵 길찾기</a>';

  document.getElementById('info-panel').classList.add('visible');
}

function focusStation(lat, lng, id) {
  map.setCenter(new kakao.maps.LatLng(lat, lng));
  map.setLevel(3);
  const s = stations.find(x => x.id === id);
  if (s) {
    const priced = stations.filter(x => x.price > 0);
    const minPrice = priced.length ? Math.min(...priced.map(x => x.price)) : 0;
    showInfoPanel(s, s.price === minPrice && minPrice > 0);
  }
}

/* ══════════════════════════════════════════════════════
   메인
══════════════════════════════════════════════════════ */
async function loadStations() {
  const fuelCode = document.getElementById('fuel-type').value;
  const radius   = document.getElementById('radius-sel').value;
  setLoading(true, '주유소 정보를 불러오는 중...');
  closeInfoPanel();
  try {
    stations = await fetchStations(userLat, userLng, radius, fuelCode);
    renderMarkers(stations);
    renderList(stations);
    showToast(stations.filter(s => s.price > 0).length + '개 주유소를 찾았습니다!', '✅');
  } catch(err) {
    console.error(err);
    showToast(err.message, '❌', 5000);
    document.getElementById('station-list').innerHTML =
      '<div style="color:var(--red);font-size:13px;padding:16px;"><strong>오류 발생</strong><br><br>' + err.message + '</div>';
  } finally {
    setLoading(false);
  }
}

function init() {
  setLoading(true, '위치를 가져오는 중...');
  if (!navigator.geolocation) {
    showToast('위치 정보 미지원 브라우저입니다.', '❌');
    setLoading(false);
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      initMap(userLat, userLng);
      loadStations();
    },
    () => {
      showToast('위치 권한 없음 — 부산 기준으로 시작합니다.', '⚠️', 4000);
      userLat = 35.1796; userLng = 129.0756;
      initMap(userLat, userLng);
      loadStations();
    },
    { timeout: 8000 }
  );
}

document.getElementById('refresh-btn').addEventListener('click', loadStations);
document.getElementById('fuel-type').addEventListener('change', loadStations);
document.getElementById('radius-sel').addEventListener('change', loadStations);

function startApp() {
  if (typeof kakao !== 'undefined' && kakao.maps) {
    kakao.maps.load(init);
  } else {
    setTimeout(startApp, 100);
  }
}
startApp();
</script>
